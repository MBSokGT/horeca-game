<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - Horeca Quest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #8b1538; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: linear-gradient(135deg, #8b1538, #a01a42); color: white; padding: 20px; border-radius: 10px; }
        .stat-card h3 { font-size: 14px; margin-bottom: 10px; opacity: 0.9; }
        .stat-card .number { font-size: 36px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #8b1538; color: white; font-weight: bold; }
        tr:hover { background: #f8f9fa; }
        .search { width: 100%; padding: 10px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 5px; font-size: 14px; }
        button { padding: 8px 15px; background: #8b1538; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #a01a42; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Админ панель - База пользователей</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Всего пользователей</h3>
                <div class="number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>Зарегистрировано сегодня</h3>
                <div class="number" id="todayUsers">0</div>
            </div>
        </div>
        
        <input type="text" class="search" id="searchInput" placeholder="Поиск по имени, email или отделу..." onkeyup="filterUsers()">
        
        <button onclick="exportEmails()">Экспорт всех email</button>
        <button onclick="loadUsers()">Обновить</button>
        
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя пользователя</th>
                    <th>Email</th>
                    <th>ФИО</th>
                    <th>Отдел</th>
                    <th>Лучший результат</th>
                    <th>Дата регистрации</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>
    
    <script>
        let allUsers = [];
        
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const data = await res.json();
            allUsers = data.users;
            
            document.getElementById('totalUsers').textContent = data.total;
            
            const today = new Date().toISOString().split('T')[0];
            const todayCount = allUsers.filter(u => u.createdAt.startsWith(today)).length;
            document.getElementById('todayUsers').textContent = todayCount;
            
            displayUsers(allUsers);
        }
        
        function displayUsers(users) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.fullName}</td>
                    <td>${u.department}</td>
                    <td>${u.score}</td>
                    <td>${new Date(u.createdAt).toLocaleString('ru-RU')}</td>
                </tr>
            `).join('');
        }
        
        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.username.toLowerCase().includes(search) ||
                u.email.toLowerCase().includes(search) ||
                u.fullName.toLowerCase().includes(search) ||
                u.department.toLowerCase().includes(search)
            );
            displayUsers(filtered);
        }
        
        function exportEmails() {
            const emails = allUsers.map(u => u.email).join('\n');
            const blob = new Blob([emails], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'horeca-emails.txt';
            a.click();
        }
        
        loadUsers();
    </script>
</body>
</html>
