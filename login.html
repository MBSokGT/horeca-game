<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horeca Quest - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #6c757d, #495057); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); width: 400px; }
        h1 { color: #8b1538; text-align: center; margin-bottom: 30px; }
        h2 { color: #495057; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #8b1538; }
        button { width: 100%; padding: 12px; background: #8b1538; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #a01a42; }
        .hidden { display: none; }
        a { color: #8b1538; text-decoration: none; cursor: pointer; }
        a:hover { text-decoration: underline; }
        p { text-align: center; color: #6c757d; }
        .message { padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h1>Horeca Quest</h1>
        
        <div id="loginForm">
            <h2>Вход</h2>
            <div id="loginMessage"></div>
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p><a onclick="showReset()">Забыли пароль?</a></p>
            <p>Нет аккаунта? <a onclick="showRegister()">Регистрация</a></p>
        </div>
        
        <div id="registerForm" class="hidden">
            <h2>Регистрация</h2>
            <div id="regMessage"></div>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="text" id="regFullName" placeholder="ФИО">
            <input type="text" id="regDepartment" placeholder="Отдел">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <p>Уже есть аккаунт? <a onclick="showLogin()">Войти</a></p>
        </div>
        
        <div id="resetForm" class="hidden">
            <h2>Восстановление пароля</h2>
            <div id="resetMessage"></div>
            <input type="email" id="resetEmail" placeholder="Email">
            <button onclick="resetPassword()">Отправить токен</button>
            <div id="tokenSection" class="hidden" style="margin-top: 20px;">
                <input type="text" id="resetToken" placeholder="Токен из консоли сервера">
                <input type="password" id="newPassword" placeholder="Новый пароль">
                <button onclick="changePassword()">Сменить пароль</button>
            </div>
            <p><a onclick="showLogin()">Назад к входу</a></p>
        </div>
    </div>
    
    <script>
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.add('hidden');
        }
        
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('resetForm').classList.add('hidden');
        }
        
        function showReset() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.remove('hidden');
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'app.html';
            } else {
                document.getElementById('loginMessage').innerHTML = '<div class="message error">' + data.error + '</div>';
            }
        }
        
        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const fullName = document.getElementById('regFullName').value;
            const department = document.getElementById('regDepartment').value;
            const password = document.getElementById('regPassword').value;
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, fullName, department, password })
            });
            
            const data = await res.json();
            if (data.success) {
                document.getElementById('regMessage').innerHTML = '<div class="message success">Регистрация успешна!</div>';
                setTimeout(showLogin, 1500);
            } else {
                document.getElementById('regMessage').innerHTML = '<div class="message error">' + data.error + '</div>';
            }
        }
        
        async function resetPassword() {
            const email = document.getElementById('resetEmail').value;
            
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await res.json();
            if (data.success) {
                document.getElementById('resetMessage').innerHTML = '<div class="message success">' + data.message + '</div>';
                document.getElementById('tokenSection').classList.remove('hidden');
            } else {
                document.getElementById('resetMessage').innerHTML = '<div class="message error">' + data.error + '</div>';
            }
        }
        
        async function changePassword() {
            const token = document.getElementById('resetToken').value;
            const newPassword = document.getElementById('newPassword').value;
            
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword })
            });
            
            const data = await res.json();
            if (data.success) {
                alert('Пароль изменен!');
                showLogin();
            } else {
                document.getElementById('resetMessage').innerHTML = '<div class="message error">' + data.error + '</div>';
            }
        }
    </script>
</body>
</html>
